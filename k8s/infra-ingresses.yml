# =============================================================================
# Backstage Ingress (via OAuth2 Proxy)
# Route: backstage.elegantsoftware.de -> backstage-oauth2-proxy (namespace: backstage)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backstage
  namespace: backstage
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - backstage.elegantsoftware.de
      secretName: wildcard-elegantsoftware-de-tls
  rules:
    - host: backstage.elegantsoftware.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backstage-oauth2-proxy
                port:
                  number: 80
