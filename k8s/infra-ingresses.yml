# =============================================================================
# Keycloak Ingress
# Route: keycloak.elegantsoftware.de -> keycloak service (namespace: keycloak)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - keycloak.elegantsoftware.de
      secretName: wildcard-elegantsoftware-de-tls
  rules:
    - host: keycloak.elegantsoftware.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
---
