apiVersion: v1
kind: Service
metadata:
  name: {{ include "blitz-pay.fullname" . }}
  labels:
    {{- include "blitz-pay.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "blitz-pay.selectorLabels" . | nindent 4 }}
