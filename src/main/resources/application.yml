spring:
  application:
    name: quickpay
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/blitzpay_db}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.connection.isolation: 2
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  hikari:
    maximum-pool-size: 10
    minimum-idle: 10
    auto-commit: true
    pool-name: HikariPool-1
  threads:
    virtual:
      enabled: true

server:
  tomcat:
    max-threads: 50
management:
  endpoints:
    web:
      exposure:
        include: metrics,health
  endpoint:
    metrics:
      enabled: true
springdoc:
  api-docs:
    path: /api-docs
  show-actuator: true
  swagger-ui:
    urlsPrimaryName: Invoice
    urls:
      - name: Invoice
        url: /api-docs/Invoice
      - name: QRPay
        url: /api-docs/QRPay
      - name: TrueLayer
        url: /api-docs/TrueLayer
      - name: Support
        url: /api-docs/Support
      - name: Better Price Agent
        url: /api-docs/Better%20Price%20Agent
      - name: General
        url: /api-docs/General
      - name: Actuator
        url: /api-docs/Actuator
api:
  default-version: 1
  versions:
    invoice: 1
    qrpay: 1
    truelayer: 1
    payments: 1

market-search:
  enabled: ${MARKET_SEARCH_ENABLED:true}
  provider: ${MARKET_SEARCH_PROVIDER:deepsearch}
  maxHits: ${MARKET_SEARCH_MAX_HITS:5}
  maxPagesToFetch: ${MARKET_SEARCH_MAX_PAGES:3}
  requestTimeout: ${MARKET_SEARCH_TIMEOUT:PT3S}
  brave:
    apiKey: ${BRAVE_SEARCH_API_KEY:}
    baseUrl: ${BRAVE_SEARCH_BASE_URL:https://api.search.brave.com}
    searchPath: ${BRAVE_SEARCH_PATH:/res/v1/web/search}
  deepsearch:
    apiKey: ${DEEPSEARCH_API_KEY:}
    baseUrl: ${DEEPSEARCH_BASE_URL:https://api.browserbase.com}
    searchPath: ${DEEPSEARCH_PATH:/v1/search}
    fetchPath: ${DEEPSEARCH_FETCH_PATH:/v1/fetch}
    allowRedirects: ${DEEPSEARCH_ALLOW_REDIRECTS:true}
    allowInsecureSsl: ${DEEPSEARCH_ALLOW_INSECURE_SSL:false}
    proxies: ${DEEPSEARCH_PROXIES:false}
  model: ${MARKET_SEARCH_MODEL:gpt-4.1-mini}
  baseUrl: ${MARKET_SEARCH_BASE_URL:http://localhost:8080}
  koog:
    enabled: ${MARKET_SEARCH_KOOG_ENABLED:true}
    deterministicFallback: ${MARKET_SEARCH_KOOG_DETERMINISTIC_FALLBACK:true}
    openAiApiKey: ${OPENAI_API_KEY:}
    systemPromptVersion: ${MARKET_SEARCH_KOOG_PROMPT_VERSION:product-price-research-v1}
  a2a:
    port: ${MARKET_SEARCH_A2A_PORT:8099}
    path: ${MARKET_SEARCH_A2A_PATH:/a2a/market-search}
  card:
    id: ${MARKET_SEARCH_CARD_ID:market-search-agent}
    name: ${MARKET_SEARCH_CARD_NAME:Market Search Agent}
    description: ${MARKET_SEARCH_CARD_DESCRIPTION:A2A KOOG market-search agent that uses configurable live providers and returns structured price-comparison and monitoring results}
    version: ${MARKET_SEARCH_CARD_VERSION:1.0.0}

truelayer:
  apiBase: ${TRUELAYER_API_BASE:https://api.truelayer-sandbox.com}
  accessToken: ${TRUELAYER_ACCESS_TOKEN:dummy-access-token}
  webhookJku: ${TRUELAYER_WEBHOOK_JKU:http://localhost:8080/.well-known/jwks.json}
  # SDK configuration
  clientId: ${TRUELAYER_CLIENT_ID}
  clientSecret: ${TRUELAYER_CLIENT_SECRET}
  keyId: ${TRUELAYER_KEY_ID}
  privateKeyPath: ${TRUELAYER_PRIVATE_KEY_PATH}
  environment: ${TRUELAYER_ENV:sandbox}
  httpLogs: ${TRUELAYER_HTTP_LOGS:false}
  merchantAccountId: ${TRUELAYER_MERCHANT_ACCOUNT_ID}
  webhooks:
    environment: sandbox
    maxSkew: PT60M
