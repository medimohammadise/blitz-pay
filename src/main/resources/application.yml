modulith:
  events:
    publication:
      mode: async
  application:
    name: blitzpay
  banner:
    location: classpath:banner.txt
    charset: UTF-8
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}"
    driver-class-name: "${SPRING_DATASOURCE_DRIVER:org.h2.Driver}"
    username: "${SPRING_DATASOURCE_USERNAME:sa}"
    password: "${SPRING_DATASOURCE_PASSWORD:}"
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.connection.isolation: 2
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: false
    baseline-version: 1
    validate-on-migrate: true
    locations: classpath:db/migration
    # If you want to clean DB in dev (DANGEROUS in production!)
    clean-disabled: false # Set to true in production!

    # Schema management
    schemas: public
    default-schema: public

    # Placeholders (optional)
    placeholders:
      table-prefix: ""
  hikari:
    maximum-pool-size: 10
    minimum-idle: 10
    auto-commit: true
    pool-name: HikariPool-1
  threads:
    virtual:
      enabled: true

qr:
  expiry:
    minutes: 15
    cleanup-interval: 300000
  truelayer:
    deep-link-base: "https://payment.truelayer.com/quickpay"
    redirect-uri: "http://10.0.2.2:8080/api/qr-payments/callback"
  server:
    base-url: "http://localhost:8080" # For backend internal use

server:
  address: 0.0.0.0 # This is correct! Listen on all interfaces
  port: 8080
  tomcat:
    max-threads: 50

management:
  endpoints:
    web:
      exposure:
        include: "metrics,health"
  endpoint:
    metrics:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    url: /api-docs
    config-url: /api-docs/swagger-config
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
    persist-authorization: true
    csrf:
      enabled: true
  packages-to-scan: de.elegantsoftware.blitzpay
  paths-to-match: /api/**
  show-actuator: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

truelayer:
  apiBase: "${TRUELAYER_API_BASE:https://api.truelayer-sandbox.com}"
  accessToken: "${TRUELAYER_ACCESS_TOKEN:dummy-access-token}"
  webhookJku: "${TRUELAYER_WEBHOOK_JKU:http://localhost:8080/.well-known/jwks.json}"
  clientId: "${TRUELAYER_CLIENT_ID}"
  clientSecret: "${TRUELAYER_CLIENT_SECRET}"
  keyId: "${TRUELAYER_KEY_ID}"
  privateKeyPath: "${TRUELAYER_PRIVATE_KEY_PATH}"
  environment: "${TRUELAYER_ENV:sandbox}"
  httpLogs: "${TRUELAYER_HTTP_LOGS:false}"
  merchantAccountId: "${TRUELAYER_MERCHANT_ACCOUNT_ID}"
  redirectUri: "${TRUELAYER_REDIRECT_URI:http://localhost:8080/return}"
  webhooks:
    environment: sandbox
    maxSkew: 3600

# LOGGING MUST BE AT ROOT LEVEL, not under qr.server!
logging:
  level:
    de.elegantsoftware.blitzpay: DEBUG
    de.elegantsoftware.blitzpay.api.inbound: TRACE
    de.elegantsoftware.blitzpay.truelayer.inbound: TRACE
    web: DEBUG

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/quickpay.log
