name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_call:
    inputs:
      gradle-args:
        required: false
        type: string
        default: ""
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
env:
  ORG_GRADLE_PROJECT_javaVersion: ${{ vars.JAVA_VERSION }}
permissions:
  contents: read
  actions: write
jobs:
  test:
      uses: elegant-software/elegant-ci-cd-pipeline/.github/workflows/backend-gradle-test.yml@1f506dd1bd3686d6e31b3169977b2b672ff38a1a
      with:
        gradle-args: ${{ inputs.gradle-args }}
        unit-test-task: test
        integration-test-task: help

  qodana_code_quality:
    name: qodana
    needs: test
    if: false # temporarily disabled to verify watchdog functionality and codana docker issue
    permissions:
      contents: write
      pull-requests: write
      actions: write
      checks: write
    uses: elegant-software/elegant-ci-cd-pipeline/.github/workflows/backend-qa-qodana-code-quality.yml@1f506dd1bd3686d6e31b3169977b2b672ff38a1a
    secrets: inherit

  sbom-upload:
    name: dependency track & SBOM upload
    needs: test
    if: false # temporarily disabled to verify watchdog functionality
    permissions:
      actions: write
      contents: read
    uses: elegant-software/elegant-ci-cd-pipeline/.github/workflows/backnd-qa-dependency-track-upload.yml@1f506dd1bd3686d6e31b3169977b2b672ff38a1a
    secrets: inherit
