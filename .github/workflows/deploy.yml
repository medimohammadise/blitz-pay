name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Docker image tag to deploy (e.g. v0.2.2)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    env:
      APP_NAME: ${{ vars.APP_NAME }}
      HELM_CHART: ./helm/${{ vars.APP_NAME }}
      ENV_SUFFIX: ${{ inputs.environment == 'production' && 'prod' || 'staging' }}
      OTLP_LOGS_ENDPOINT: ${{ vars.OTLP_LOGS_ENDPOINT }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure kubectl
        env:
          K8S_SERVER: ${{ secrets.K8S_SERVER }}
          K8S_CA_CERT: ${{ secrets.K8S_CA_CERT }}
          K8S_TOKEN: ${{ secrets.K8S_TOKEN }}
        run: |
          missing=()
          [ -z "$K8S_SERVER" ]  && missing+=("K8S_SERVER")
          [ -z "$K8S_CA_CERT" ] && missing+=("K8S_CA_CERT")
          [ -z "$K8S_TOKEN" ]   && missing+=("K8S_TOKEN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

          mkdir -p "$HOME/.kube"
          echo "$K8S_CA_CERT" | base64 -d > "$HOME/.kube/ca.crt"

          kubectl config set-cluster deploy-cluster \
            --server="$K8S_SERVER" \
            --certificate-authority="$HOME/.kube/ca.crt" \
            --embed-certs=true

          kubectl config set-credentials deploy-user \
            --token="$K8S_TOKEN"

          kubectl config set-context deploy-context \
            --cluster=deploy-cluster \
            --user=deploy-user

          kubectl config use-context deploy-context

      - name: Verify cluster connectivity
        run: kubectl cluster-info --request-timeout=10s

      - name: Deploy to ${{ inputs.environment }}
        run: |
          HELM_ARGS=(
            --namespace blitzpay-$ENV_SUFFIX
            --create-namespace
            --values $HELM_CHART/values.yaml
            --values $HELM_CHART/values-$ENV_SUFFIX.yaml
            --set image.tag=${{ inputs.image-tag }}
            --wait
            --timeout 5m
          )

          # Allow environment-specific OTLP endpoint from GitHub Environment Variables.
          if [ -n "${OTLP_LOGS_ENDPOINT:-}" ]; then
            HELM_ARGS+=(--set-string config.otlpLogsEndpoint="$OTLP_LOGS_ENDPOINT")
          fi

          helm upgrade --install $APP_NAME $HELM_CHART "${HELM_ARGS[@]}"

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/$APP_NAME \
            --namespace blitzpay-$ENV_SUFFIX \
            --timeout=5m
